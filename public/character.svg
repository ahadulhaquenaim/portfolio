<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640">
  <defs>
    <radialGradient id="aura" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05030c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1758"/>
      <stop offset="100%" stop-color="#0a0716"/>
    </linearGradient>
  </defs>
  <ellipse cx="240" cy="300" rx="220" ry="300" fill="url(#aura)"/>
  <!-- simple monarch silhouette -->
  <g fill="url(#body)" stroke="#a855f7" stroke-width="2" stroke-opacity="0.6">
    <circle cx="240" cy="150" r="62"/>
    <path d="M150 560 C150 380 180 300 240 300 C300 300 330 380 330 560 Z"/>
    <path d="M240 300 L120 360 L130 540 L165 530 L160 380 Z"/>
    <path d="M240 300 L360 360 L350 540 L315 530 L320 380 Z"/>
  </g>
  <circle cx="220" cy="145" r="6" fill="#a855f7"/>
  <circle cx="262" cy="145" r="6" fill="#a855f7"/>
  <text x="240" y="615" text-anchor="middle" font-family="serif" font-size="22"
        fill="#8b5cf6" opacity="0.8">DROP YOUR PNG HERE</text>
</svg>
